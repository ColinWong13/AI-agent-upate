{% extends "base.html" %}
{% block title %}登录 - AI Agent Platform{% endblock %}

{% block hero %}
<div class="hero" style="padding:48px 32px;">
  <h1 style="font-size:1.4rem;">登录</h1>
</div>
{% endblock %}

{% block content %}
<div class="container" style="max-width:420px;">
  <div id="msg" style="text-align:center;margin-bottom:16px;font-size:14px;"></div>
  <form id="loginForm" style="display:flex;flex-direction:column;gap:14px;">
    <input id="email" type="text" placeholder="邮箱" required style="padding:10px 14px;border:1px solid var(--border);border-radius:6px;font-size:14px;">
    <input id="password" type="password" placeholder="密码" required style="padding:10px 14px;border:1px solid var(--border);border-radius:6px;font-size:14px;">
    <button type="submit" style="padding:10px;background:var(--blue-dark);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:15px;">登录</button>
  </form>
  <div style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-light);">
    没有账号？<a href="/register" style="color:var(--blue-mid);">立即注册</a>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('msg');
  msg.textContent = '';
  try {
    const resp = await fetch('/api/user/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      }),
    });
    const data = await resp.json();
    if (resp.ok) {
      localStorage.setItem('token', data.access_token);
      msg.innerHTML = '<span style="color:#2d7a2d;">登录成功，跳转中...</span>';
      setTimeout(() => { window.location.href = '/'; }, 500);
    } else {
      msg.innerHTML = '<span style="color:#a04040;">' + (data.detail || '登录失败') + '</span>';
    }
  } catch(err) {
    msg.innerHTML = '<span style="color:#a04040;">网络错误，请重试</span>';
  }
});
</script>
{% endblock %}
