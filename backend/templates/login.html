{% extends "base.html" %}
{% block title %}Sign In — The Agent Report{% endblock %}

{% block hero %}
<div class="hero" style="padding:40px 24px;">
  <h1 style="font-size:2rem;">Sign In</h1>
</div>
{% endblock %}

{% block content %}
<div class="container" style="max-width:400px;">
  <div id="msg" style="text-align:center;margin-bottom:18px;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:1px;"></div>
  <form id="loginForm" style="display:flex;flex-direction:column;gap:20px;">
    <input id="email" type="text" placeholder="EMAIL ADDRESS" required style="width:100%;padding:10px 0;font-size:13px;">
    <input id="password" type="password" placeholder="PASSWORD" required style="width:100%;padding:10px 0;font-size:13px;">
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">SIGN IN</button>
  </form>
  <div style="text-align:center;margin-top:20px;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--neutral-500);">
    No account? <a href="/register" style="color:var(--fg);font-weight:700;">Subscribe</a>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => { e.preventDefault();
  const msg = document.getElementById('msg'); msg.textContent = '';
  try {
    const resp = await fetch('/api/user/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('email').value,password:document.getElementById('password').value})});
    const data = await resp.json();
    if (resp.ok) { localStorage.setItem('token',data.access_token); msg.innerHTML='<span style="color:var(--fg);">Signed in. Redirecting...</span>'; setTimeout(()=>{window.location.href='/'},500); }
    else { msg.innerHTML='<span style="color:var(--accent);">'+(data.detail||'Sign in failed')+'</span>'; }
  } catch(err) { msg.innerHTML='<span style="color:var(--accent);">Network error</span>'; }
});
</script>
{% endblock %}
