{% extends "base.html" %}
{% block title %}Subscribe — The Agent Report{% endblock %}

{% block hero %}
<div class="hero" style="padding:40px 24px;">
  <h1 style="font-size:2rem;">Subscribe</h1>
</div>
{% endblock %}

{% block content %}
<div class="container" style="max-width:400px;">
  <div id="msg" style="text-align:center;margin-bottom:18px;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:1px;"></div>
  <form id="registerForm" style="display:flex;flex-direction:column;gap:18px;">
    <div>
      <input id="nickname" type="text" placeholder="DISPLAY NAME" required style="width:100%;padding:10px 0;font-size:13px;">
      <div id="nicknameErr" style="font-family:var(--font-mono);font-size:9px;color:var(--accent);margin-top:3px;text-transform:uppercase;display:none;"></div>
    </div>
    <div>
      <input id="email" type="text" placeholder="EMAIL ADDRESS" required style="width:100%;padding:10px 0;font-size:13px;">
      <div id="emailErr" style="font-family:var(--font-mono);font-size:9px;color:var(--accent);margin-top:3px;text-transform:uppercase;display:none;"></div>
    </div>
    <div>
      <input id="password" type="password" placeholder="PASSWORD (8+ CHARS)" required style="width:100%;padding:10px 0;font-size:13px;">
      <div id="passwordErr" style="font-family:var(--font-mono);font-size:9px;color:var(--accent);margin-top:3px;text-transform:uppercase;display:none;"></div>
    </div>
    <div>
      <input id="confirmPassword" type="password" placeholder="CONFIRM PASSWORD" required style="width:100%;padding:10px 0;font-size:13px;">
      <div id="confirmErr" style="font-family:var(--font-mono);font-size:9px;color:var(--accent);margin-top:3px;text-transform:uppercase;display:none;"></div>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">SUBSCRIBE</button>
  </form>
  <div style="text-align:center;margin-top:20px;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--neutral-500);">
    Already a subscriber? <a href="/login" style="color:var(--fg);font-weight:700;">Sign In</a>
  </div>
</div>

<script>
function validate() { let ok=true;
  const n=document.getElementById('nickname').value.trim(),e=document.getElementById('email').value.trim(),p=document.getElementById('password').value,c=document.getElementById('confirmPassword').value;
  if(n.length<2||n.length>20){document.getElementById('nicknameErr').textContent='2-20 characters';document.getElementById('nicknameErr').style.display='block';ok=false;}else{document.getElementById('nicknameErr').style.display='none';}
  if(!e.includes('@')||!e.split('@').pop().includes('.')){document.getElementById('emailErr').textContent='Invalid email';document.getElementById('emailErr').style.display='block';ok=false;}else{document.getElementById('emailErr').style.display='none';}
  if(p.length<8){document.getElementById('passwordErr').textContent='Min 8 characters';document.getElementById('passwordErr').style.display='block';ok=false;}else{document.getElementById('passwordErr').style.display='none';}
  if(p!==c){document.getElementById('confirmErr').textContent='Passwords must match';document.getElementById('confirmErr').style.display='block';ok=false;}else{document.getElementById('confirmErr').style.display='none';}
  return ok;
}
document.getElementById('registerForm').addEventListener('submit',async(e)=>{e.preventDefault();if(!validate())return;
  const msg=document.getElementById('msg');msg.textContent='';
  try{
    const resp=await fetch('/api/user/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nickname:document.getElementById('nickname').value.trim(),email:document.getElementById('email').value.trim(),password:document.getElementById('password').value})});
    const data=await resp.json();
    if(resp.ok){localStorage.setItem('token',data.access_token);msg.innerHTML='<span style="color:var(--fg);">Subscribed. Redirecting...</span>';setTimeout(()=>{window.location.href='/'},500);}
    else{msg.innerHTML='<span style="color:var(--accent);">'+(data.detail||'Failed')+'</span>';}
  }catch(err){msg.innerHTML='<span style="color:var(--accent);">Network error</span>';}
});
</script>
{% endblock %}
