{% extends "base.html" %}
{% block title %}注册 - AI Agent Platform{% endblock %}

{% block hero %}
<div class="hero" style="padding:48px 32px;">
  <h1 style="font-size:1.4rem;">注册</h1>
</div>
{% endblock %}

{% block content %}
<div class="container" style="max-width:420px;">
  <div id="msg" style="text-align:center;margin-bottom:16px;font-size:14px;"></div>
  <form id="registerForm" style="display:flex;flex-direction:column;gap:14px;">
    <div>
      <input id="nickname" type="text" placeholder="昵称（2-20个字符）" required style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:6px;font-size:14px;">
      <div id="nicknameErr" style="font-size:12px;color:#a04040;margin-top:2px;display:none;"></div>
    </div>
    <div>
      <input id="email" type="text" placeholder="邮箱" required style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:6px;font-size:14px;">
      <div id="emailErr" style="font-size:12px;color:#a04040;margin-top:2px;display:none;"></div>
    </div>
    <div>
      <input id="password" type="password" placeholder="密码（至少8个字符）" required style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:6px;font-size:14px;">
      <div id="passwordErr" style="font-size:12px;color:#a04040;margin-top:2px;display:none;"></div>
    </div>
    <div>
      <input id="confirmPassword" type="password" placeholder="确认密码" required style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:6px;font-size:14px;">
      <div id="confirmErr" style="font-size:12px;color:#a04040;margin-top:2px;display:none;"></div>
    </div>
    <button type="submit" style="padding:10px;background:var(--blue-dark);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:15px;">注册</button>
  </form>
  <div style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-light);">
    已有账号？<a href="/login" style="color:var(--blue-mid);">去登录</a>
  </div>
</div>

<script>
function validate() {
  let ok = true;
  const nick = document.getElementById('nickname').value.trim();
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;
  const cpw = document.getElementById('confirmPassword').value;

  if (nick.length < 2 || nick.length > 20) {
    document.getElementById('nicknameErr').textContent = '昵称需 2-20 个字符'; document.getElementById('nicknameErr').style.display = 'block'; ok = false;
  } else { document.getElementById('nicknameErr').style.display = 'none'; }

  if (!email.includes('@') || !email.split('@').pop().includes('.')) {
    document.getElementById('emailErr').textContent = '请输入有效邮箱'; document.getElementById('emailErr').style.display = 'block'; ok = false;
  } else { document.getElementById('emailErr').style.display = 'none'; }

  if (pw.length < 8) {
    document.getElementById('passwordErr').textContent = '密码至少 8 个字符'; document.getElementById('passwordErr').style.display = 'block'; ok = false;
  } else { document.getElementById('passwordErr').style.display = 'none'; }

  if (pw !== cpw) {
    document.getElementById('confirmErr').textContent = '两次密码输入不一致'; document.getElementById('confirmErr').style.display = 'block'; ok = false;
  } else { document.getElementById('confirmErr').style.display = 'none'; }

  return ok;
}

document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (!validate()) return;
  const msg = document.getElementById('msg');
  msg.textContent = '';
  try {
    const resp = await fetch('/api/user/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        nickname: document.getElementById('nickname').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      }),
    });
    const data = await resp.json();
    if (resp.ok) {
      localStorage.setItem('token', data.access_token);
      msg.innerHTML = '<span style="color:#2d7a2d;">注册成功，跳转中...</span>';
      setTimeout(() => { window.location.href = '/'; }, 500);
    } else {
      msg.innerHTML = '<span style="color:#a04040;">' + (data.detail || '注册失败') + '</span>';
    }
  } catch(err) {
    msg.innerHTML = '<span style="color:#a04040;">网络错误，请重试</span>';
  }
});
</script>
{% endblock %}
